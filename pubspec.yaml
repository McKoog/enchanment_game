name: enchantment_game
description: "Enchantment game"
publish_to: 'none'

version: 0.1.2+1
environment:
  sdk: "^3.4.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_bloc: ^8.1.6
  auto_size_text: ^3.0.0
  universal_platform: ^1.0.0+1
  uuid: ^4.5.1
  package_info_plus: ^8.1.1
  shared_preferences: ^2.0.17
  audioplayers: ^6.6.0
  flame_audio: ^2.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:

  uses-material-design: true

  assets:
    - assets/
    - assets/background/
    - assets/icons/
    - assets/icons/menus/
    - assets/icons/armors/
    - assets/icons/enemies/
    - assets/icons/other_items/
    - assets/icons/stock_equip/
    - assets/icons/weapons/
    - assets/sounds/
    - assets/sounds/themes/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages

flutter_launcher_icons:
  image_path: "assets/icons/other_items/enchant_scroll_weapon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icons/other_items/enchant_scroll_weapon.png"
    background_color: "#0175C2"
    theme_color: "#0175C2"
  windows:
    generate: true
    image_path: "assets/icons/other_items/enchant_scroll_weapon.png"
  macos:
    generate: true
    image_path: "assets/icons/other_items/enchant_scroll_weapon.png"
